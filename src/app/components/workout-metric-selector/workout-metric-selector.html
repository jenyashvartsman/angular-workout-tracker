<div>
  <p class="text-sm font-medium text-gray-700 mb-3">
    {{ label() }}<span class="text-gray-400 font-normal"> ({{ unit() }})</span>
  </p>
  <div
    class="grid grid-cols-4 sm:grid-cols-5 gap-2"
    role="group"
    [attr.aria-label]="label() + ' options'"
  >
    @for (option of options(); track option) {
      <button
        type="button"
        [class]="
          selected() === option
            ? 'py-2 rounded-lg text-sm font-semibold bg-indigo-600 text-white shadow-sm transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 cursor-pointer'
            : 'py-2 rounded-lg text-sm font-medium bg-gray-100 text-gray-700 hover:bg-gray-200 transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 cursor-pointer'
        "
        [attr.aria-pressed]="selected() === option"
        (click)="metricChange.emit(option)"
      >
        {{ option }}
      </button>
    }
  </div>
</div>
