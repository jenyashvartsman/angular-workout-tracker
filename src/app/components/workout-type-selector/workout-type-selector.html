<div class="flex flex-wrap gap-2" role="group" aria-label="Select workout type">
  @for (option of options(); track option) {
    <button
      type="button"
      [class]="
        selected() === option
          ? 'px-4 py-1.5 rounded-full text-sm font-medium bg-indigo-600 text-white shadow-sm transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 cursor-pointer'
          : 'px-4 py-1.5 rounded-full text-sm font-medium bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-200 hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 dark:focus:ring-offset-gray-800 cursor-pointer'
      "
      [attr.aria-pressed]="selected() === option"
      (click)="typeChange.emit(option)"
    >
      {{ option }}
    </button>
  }
</div>
