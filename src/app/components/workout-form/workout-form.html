<section
  class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6"
  aria-labelledby="form-title"
>
  <h2 id="form-title" class="text-xl font-bold text-gray-900 mb-6">Log Workout</h2>

  <div class="space-y-6">
    <div>
      <p class="text-sm font-medium text-gray-700 mb-3" id="type-label">Workout Type</p>
      <app-workout-type-selector
        [options]="typeOptions()"
        [selected]="selectedType()"
        (typeChange)="typeChange.emit($event)"
        aria-labelledby="type-label"
      />
    </div>

    <app-workout-metric-selector
      [options]="metricOptions()"
      [selected]="selectedMetric()"
      [label]="metricConfig().label"
      [unit]="metricConfig().unit"
      (metricChange)="metricChange.emit($event)"
    />

    <button
      type="button"
      class="w-full mt-6 py-3 px-6 bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 text-white font-semibold rounded-xl transition-colors shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 cursor-pointer"
      (click)="addWorkout.emit()"
    >
      Add Workout
    </button>
  </div>
</section>
