<article class="bg-white rounded-xl border border-gray-100 shadow-sm p-4 flex items-center gap-4">
  <div
    class="w-11 h-11 rounded-full bg-indigo-50 flex items-center justify-center text-xl flex-shrink-0"
    aria-hidden="true">
    {{ icon() }}
  </div>
  <div class="flex-1 min-w-0">
    <p class="font-semibold text-gray-900">{{ workout().type }}</p>
    <p class="text-sm text-gray-500 mt-0.5">{{ metricDisplay() }}</p>
  </div>
  <div class="flex-shrink-0 text-right">
    <p class="text-sm font-semibold text-orange-500">{{ calories() }} kcal</p>
  </div>
</article>
